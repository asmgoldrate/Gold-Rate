<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Gold Rates - Al Saigh Al Marouf Jewellery</title>

<style>
body{
    margin:0;
    padding:15px;
    background:#000000;
    font-family:Arial, sans-serif;
    color:#fff;
    text-align:center;
}

h1{
    color:#d4af37;
    font-size:2em;
    margin-bottom:5px;
}

.subtitle{
    color:#aaa;
    margin-bottom:20px;
}

#ounceUSD{
    font-size:1.4em;
    color:#00ff99;
    margin:20px 0;
    font-weight:bold;
}

.rates-card{
    background:#111;
    border-radius:15px;
    padding:15px;
    max-width:420px;
    margin:0 auto 25px;
    box-shadow:0 0 15px rgba(212,175,55,0.4);
}

.rate-row{
    display:flex;
    justify-content:space-between;
    padding:12px;
    border-bottom:1px solid #333;
    font-size:1.1em;
}

.rate-row:last-child{
    border-bottom:none;
}

.karat{
    color:#d4af37;
    font-weight:bold;
}

.price{
    color:#00ffcc;
}

.updated-time{
    color:#888;
    font-size:0.9em;
    margin-top:15px;
}

.refresh-btn{
    background:#d4af37;
    color:#000;
    font-weight:bold;
    padding:12px;
    border:none;
    border-radius:10px;
    width:90%;
    max-width:400px;
    cursor:pointer;
    font-size:1.1em;
}

.refresh-btn:hover{
    background:#f1c232;
}

.whatsapp{
    margin-top:20px;
    font-size:1.2em;
    color:#25D366;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>AL SAIGH AL MAROUF JEWELLERY</h1>
<div class="subtitle">Premium Gold Rates - Oman</div>

<div id="ounceUSD">Loading Gold Price...</div>

<div class="rates-card">
    <div class="rate-row">
        <span class="karat">24K (1 gm)</span>
        <span class="price" id="g24">Loading...</span>
    </div>
    <div class="rate-row">
        <span class="karat">22K (1 gm)</span>
        <span class="price" id="g22">Loading...</span>
    </div>
    <div class="rate-row">
        <span class="karat">21K (1 gm)</span>
        <span class="price" id="g21gm">Loading...</span>
    </div>
    <div class="rate-row">
        <span class="karat">18K (1 gm)</span>
        <span class="price" id="g18">Loading...</span>
    </div>
    <div class="rate-row">
        <span class="karat">21K (1 Tola)</span>
        <span class="price" id="tola21">Loading...</span>
    </div>
</div>

<p class="updated-time" id="time">Last updated: --</p>

<div class="whatsapp">
📞 WhatsApp: 71171790
</div>

<button class="refresh-btn" id="refreshBtn">Refresh Rates</button>

<script>
const refreshBtn = document.getElementById("refreshBtn");
let isLoading = false;

async function loadGoldPrice(){

    if(isLoading) return;
    isLoading = true;
    refreshBtn.disabled = true;
    refreshBtn.innerText = "Refreshing...";

    try{
        const response = await fetch('https://api.gold-api.com/price/XAU');
        const data = await response.json();

        const ounceUSD = data.price;

        document.getElementById("ounceUSD").innerText =
        "Gold per Ounce (USD): " + ounceUSD.toFixed(2);

        const gold24gm = (ounceUSD * 1.4485 + 15) / 116.64;
        const gold22gm = gold24gm * 0.921;
        const gold21gm = gold24gm * 0.880;
        const gold18gm = gold24gm * 0.755;
        const tola21  = gold21gm * 11.664;

        document.getElementById("g24").innerText = gold24gm.toFixed(3) + " OMR";
        document.getElementById("g22").innerText = gold22gm.toFixed(3) + " OMR";
        document.getElementById("g21gm").innerText = gold21gm.toFixed(3) + " OMR";
        document.getElementById("g18").innerText = gold18gm.toFixed(3) + " OMR";
        document.getElementById("tola21").innerText = tola21.toFixed(2) + " OMR";

        const now = new Date();
        const muscatTime = now.toLocaleString('en-US',{
            timeZone:'Asia/Muscat',
            dateStyle:'medium',
            timeStyle:'short'
        });

        document.getElementById("time").innerText =
        "Last updated: " + muscatTime;

    }catch(err){
        document.getElementById("ounceUSD").innerText = "Error loading price";
    }

    isLoading = false;
    refreshBtn.disabled = false;
    refreshBtn.innerText = "Refresh Rates";
}

window.addEventListener('load', loadGoldPrice);
refreshBtn.addEventListener('click', loadGoldPrice);
setInterval(loadGoldPrice, 300000);

</script>

</body>
</html>
