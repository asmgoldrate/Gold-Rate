<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Price System</title>

<style>
body{
  margin:0;
  font-family:Tahoma;
  background:#0f0f0f;
  color:#FFD54F;
  text-align:center;
}

header{
  padding:15px;
  font-size:20px;
  font-weight:bold;
  background:#1a1a1a;
  border-bottom:2px solid #D4AF37;
}

.nav-buttons{
  margin:15px;
}

.nav-buttons button{
  padding:10px 18px;
  margin:5px;
  border:none;
  border-radius:6px;
  background:#D4AF37;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

.section{
  display:none;
}

.active{
  display:block;
}

table{
  width:90%;
  margin:20px auto;
  border-collapse:collapse;
  background:#1c1c1c;
}

th, td{
  padding:12px;
  border-bottom:1px solid #333;
}

th{
  background:#2a2a2a;
}
</style>
</head>

<body>

<header>شركة الصائغ المعروف</header>

<div class="nav-buttons">
  <button onclick="showSection('bars')">أسعار السبائك</button>
  <button onclick="showSection('karats')">أسعار العيارات</button>
</div>

<!-- Gold Bars Section -->
<div id="bars" class="section active">
  <h2>أسعار سبائك الذهب 24K</h2>
  <table>
    <tr><th>الوحدة</th><th>السعر (OMR)</th></tr>
    <tr><td>1 غرام</td><td>--</td></tr>
    <tr><td>2.5 غرام</td><td>--</td></tr>
    <tr><td>5 غرام</td><td>--</td></tr>
    <tr><td>10 غرام</td><td>--</td></tr>
    <tr><td>1 تولة</td><td>--</td></tr>
    <tr><td>20 غرام</td><td>--</td></tr>
    <tr><td>50 غرام</td><td>--</td></tr>
    <tr><td>100 غرام</td><td>--</td></tr>
    <tr><td>116.64 غرام</td><td>--</td></tr>
  </table>
</div>

<!-- Karats Section -->
<div id="karats" class="section">
  <h2>أسعار الذهب حسب العيار</h2>
  <table>
    <tr><th>العيار</th><th>الوحدة</th><th>السعر (OMR)</th></tr>
    <tr><td>24K</td><td>1 جرام</td><td>--</td></tr>
    <tr><td>22K</td><td>1 جرام</td><td>--</td></tr>
    <tr><td>21K</td><td>1 جرام</td><td>--</td></tr>
    <tr><td>18K</td><td>1 جرام</td><td>--</td></tr>
    <tr><td>21K</td><td>1 تولة</td><td>--</td></tr>
  </table>
</div>

<script>
function showSection(id){
  document.getElementById('bars').classList.remove('active');
  document.getElementById('karats').classList.remove('active');
  document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
