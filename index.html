<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Price Display</title>

<style>
body{
  margin:0;
  font-family:Tahoma;
  background:url('https://images.unsplash.com/photo-1610375461369-d613b564f2ea?auto=format&fit=crop&w=1400&q=80');
  background-size:cover;
  background-position:center;
  color:#FFD700;
  overflow:hidden;
}

.overlay{
  background:rgba(0,0,0,0.85);
  height:100vh;
  width:100%;
  overflow:hidden;
}

.slider{
  display:flex;
  width:200%;
  height:100%;
  transition:0.5s;
}

.page{
  width:100%;
  padding:20px;
  box-sizing:border-box;
  text-align:center;
}

h2{
  margin-top:10px;
  margin-bottom:20px;
}

table{
  width:95%;
  margin:auto;
  border-collapse:collapse;
  background:rgba(20,20,20,0.9);
  backdrop-filter:blur(5px);
}

th, td{
  padding:14px;
  border-bottom:1px solid #333;
  font-size:18px;
}

th{
  background:#111;
  color:#FFD700;
  font-size:20px;
}

tr:hover{
  background:#1a1a1a;
}

.footer-note{
  position:absolute;
  bottom:10px;
  width:100%;
  text-align:center;
  font-size:14px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="overlay">

<div class="slider" id="slider">

<!-- PAGE 1 - GOLD BARS -->
<div class="page">
<h2>أسعار سبائك الذهب 24K</h2>
<table>
<tr><th>الوحدة</th><th>السعر (OMR)</th></tr>
<tr><td>1 غرام</td><td>--</td></tr>
<tr><td>2.5 غرام</td><td>--</td></tr>
<tr><td>5 غرام</td><td>--</td></tr>
<tr><td>10 غرام</td><td>--</td></tr>
<tr><td>1 تولة</td><td>--</td></tr>
<tr><td>20 غرام</td><td>--</td></tr>
<tr><td>50 غرام</td><td>--</td></tr>
<tr><td>100 غرام</td><td>--</td></tr>
<tr><td>116.64 غرام</td><td>--</td></tr>
</table>
</div>

<!-- PAGE 2 - KARATS -->
<div class="page">
<h2>أسعار الذهب حسب العيار</h2>
<table>
<tr><th>العيار</th><th>الوحدة</th><th>السعر (OMR)</th></tr>
<tr><td>24K</td><td>1 جرام</td><td>--</td></tr>
<tr><td>22K</td><td>1 جرام</td><td>--</td></tr>
<tr><td>21K</td><td>1 جرام</td><td>--</td></tr>
<tr><td>18K</td><td>1 جرام</td><td>--</td></tr>
<tr><td>21K</td><td>1 تولة</td><td>--</td></tr>
</table>
</div>

</div>

<div class="footer-note">
👉 Swipe left / right to change page
</div>

</div>

<script>
let slider = document.getElementById("slider");
let current = 0;
let startX = 0;

document.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e=>{
  let endX = e.changedTouches[0].clientX;
  if(startX - endX > 50){
    current = 1;
  }
  if(endX - startX > 50){
    current = 0;
  }
  slider.style.transform = "translateX(-"+(current*50)+"%)";
});
</script>

</body>
</html>
